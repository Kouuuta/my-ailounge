name: Daily Feed Ingestion

on:
  # Runs every day at 8:00 AM UTC (4:00 PM PHT)
  schedule:
    - cron: '0 8 * * *'

  # Allows manual trigger from GitHub Actions UI
  # Use this for breaking news (critical CVEs, major releases)
  workflow_dispatch:
    inputs:
      source:
        description: 'Which source to ingest (leave empty to run all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - hacker-news
          - github-trending
          - rss
          - manual-feeds

jobs:
  ingest:
    name: Ingest Feed Sources
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Set up Python (for scraper.py) ────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      # ── 5. Run ingestion ──────────────────────────────────────────────────

      - name: Run Hacker News ingester
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'hacker-news' || github.event_name == 'schedule' }}
        run: npx ts-node src/ingesters/hacker-news/index.ts

      - name: Run GitHub Trending scraper
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'github-trending' || github.event_name == 'schedule' }}
        run: python src/scraper.py

      - name: Run GitHub Trending → SQLite sync
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'github-trending' || github.event_name == 'schedule' }}
        run: npx ts-node src/ingesters/github-trending/index.ts

      - name: Run RSS ingester
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'rss' || github.event_name == 'schedule' }}
        run: npx ts-node src/ingesters/rss/index.ts

      - name: Run manual feeds ingester (docs/feeds/*.md)
        if: ${{ github.event.inputs.source == 'all' || github.event.inputs.source == 'manual-feeds' || github.event_name == 'schedule' }}
        run: npx ts-node src/ingesters/manual-feeds/index.ts

      # ── 6. Commit any changes to trending.md back to repo ────────────────
      # scraper.py writes to ideas/trending.md — commit that update
      - name: Commit trending.md update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ideas/trending.md
          git diff --staged --quiet || git commit -m "bot: auto-updated daily trends $(date +'%Y-%m-%d')"

      - name: Push trending.md update
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      # ── 7. Report ingestion summary ───────────────────────────────────────
      - name: Report success
        if: success()
        run: echo " - All feed sources ingested successfully on $(date +'%Y-%m-%d %H:%M UTC')"

      - name: Report failure
        if: failure()
        run: echo " - Ingestion failed. Check the logs above for which step failed."
